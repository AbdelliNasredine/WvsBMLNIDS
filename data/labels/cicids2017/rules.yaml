# CICIDS2017 corrected ground-truth labeling rules.
#
# WINDOWS ARE IN UTC. Raw libpcap packet timestamps are absolute UTC epoch, so
# NFStream/Zeek/CICFlowMeter/etc. all emit UTC flow times regardless of host
# timezone -> we label against UTC directly and sidestep the classic
# off-by-3-hours failure (the capture is Atlantic Daylight Time, ADT = UTC-3;
# corrected_UTC = ADT + 3). ADT equivalents are noted per attack for auditing.
#
# Primary source for the corrected sub-second windows and effective/attempted
# flow counts:
#   Liu, Engelen, Lynar, Essam, Joosen, "Error Prevalence in NIDS datasets:
#   A Case Study on CIC-IDS-2017 and CSE-CIC-IDS-2018", IEEE CNS 2022.
#   https://intrusion-detection.distrinet-research.be/CNS2022/CICIDS2017.html
#   Engelen, Rimmer, Joosen, "Troubleshooting an Intrusion Detection Dataset:
#   the CICIDS2017 Case Study", WTMC 2021 (per-class corrected counts, Table I).
# Topology: UNB CIC-IDS2017 page (Sharafaldin et al. 2018).
#
# NOTE (attempted vs effective): the windows below are the OUTER bound per
# attack. Engelen's "X - Attempted" flows (attacker<->victim in-window but with
# no forward payload) are NOT separated here; that refinement is applied as a
# label-noise sensitivity pass (Phase 4) using label_confidence + a fwd-payload
# filter. The counts in expected_counts.md are the *effective* counts.

dataset: cicids2017
benign_label: BENIGN

timezone:
  capture_tz: America/Halifax   # ADT (UTC-3) in July 2017
  windows_tz: UTC
  note: >
    Corrected windows published in UTC by DistriNet CNS2022. corrected_UTC = ADT + 3.
    Verify 2-3 windows against your own flow timestamps before freezing (see
    expected_counts.md sanity check).

# Reference topology (not used directly by the engine; documents the IPs below).
topology:
  firewall_nat_internal: 172.16.0.1      # Kali-via-firewall source for most attacks
  firewall_nat_public: 205.174.165.80
  attacker_kali_direct: 205.174.165.73   # Botnet C2 + Infiltration
  victim_web_server: 192.168.10.50       # Ubuntu16 Apache (primary victim)
  victim_heartbleed: 192.168.10.51       # Ubuntu12, port 444
  victim_infiltration_vista: 192.168.10.8
  victim_infiltration_mac: 192.168.10.25
  victim_subnet: 192.168.10.0/24

