# Core embedding config: reference assembly, per-model DEFAULT
# truncation, NO masking. One embedding table per (model, dataset).
assembly: reference
masking: none            # {none, anon_ip_port, mask_ip_ttl_cksum, payload_only}
truncation: default      # each model uses its own paper default
datasets: [cicids2017] 
models:
  - raw-cnn              # done (GPU smoke passed)
  - netfound             # conda/GPU
  - yatc                 # conda/GPU
  - etbert               # conda/GPU
batch_size: 256
# embeddings cached at data/embeddings/<dataset>/<model>/<assembly>_<trunc>_<mask>/<capture>.npy
# keyed by (model, checkpoint sha256, assembly cfg, truncation, masking)